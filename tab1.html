<div style="position: relative;">
  <div class="archive-title" style="position: relative; z-index: 1;">病历档案 📋</div>
  <!-- 右上角点缀一朵多肉 -->
  <canvas class="mini-succulent decor-top-right" width="70" height="70"></canvas>
</div>

<div class="clean-dossier">
  <!-- 模块 1：基础信息 (整齐卡片阵列) -->
  <div class="cd-section">
    <h3 class="cd-title">🔍 基础与状态评估</h3>
    <div class="cd-grid">
      <div class="cd-box cd-full"><span class="cd-label">病历状态</span><span class="cd-val" id="s-state">加载中...</span></div>
      <div class="cd-box"><span class="cd-label">本次记录</span><span class="cd-val" id="s-current">加载中...</span></div>
      <div class="cd-box"><span class="cd-label">上次互动</span><span class="cd-val" id="s-last">加载中...</span></div>
      <div class="cd-box"><span class="cd-label">当前关系</span><span class="cd-val" id="s-relation">加载中...</span></div>
      <div class="cd-box"><span class="cd-label">特殊性</span><span class="cd-val" id="s-special">加载中...</span></div>
    </div>
  </div>

  <!-- 模块 2：深度解析 (专业划线与重点标记) -->
  <div class="cd-section">
    <h3 class="cd-title">🧠 临床深度解析</h3>
    <ul class="cd-list">
      <li><strong class="cd-highlight">优势资源：</strong> <span id="s-resource">加载中...</span></li>
      <li><strong class="cd-highlight">问题成因：</strong> <span id="s-cause">加载中...</span></li>
      <li><strong class="cd-highlight">影响评估：</strong> <span id="s-impact">加载中...</span></li>
    </ul>
    <div class="cd-warning">
      ⚠️ <strong>注意事项：</strong> <span id="s-precaution">加载中...</span>
    </div>
  </div>

  <!-- 模块 3：干预计划 (目标框定) -->
  <div class="cd-section" style="margin-bottom: 30px;">
    <h3 class="cd-title">🛠️ 干预与目标</h3>
    <ul class="cd-list">
      <li><strong>干预方案：</strong> <span id="s-plan">加载中...</span></li>
      <li><strong>执行事项：</strong> <span id="s-action">加载中...</span></li>
    </ul>
    <div class="cd-target">
      🎯 <strong>预期目标：</strong> <span id="s-target">加载中...</span>
    </div>
  </div>
    <canvas class="mini-succulent decor-bottom-center" width="60" height="60"></canvas>
  <div style="text-align: center; font-size: 11px; color: var(--text-main); opacity: 0.5; margin-top: -5px; letter-spacing: 2px;">林</div>
</div>
