<!-- 顶部标题与听诊器装饰 -->
<div class="archive-header">
  <div class="archive-title">病历档案 📋</div>
  <img src="assets/stethoscope.webp" class="decor-stethoscope" alt="听诊器" />
</div>

<div class="clean-dossier">
  <!-- 模块 1：基础信息 -->
  <div class="cd-section">
    <h3 class="cd-title">🔍 评估</h3>
    <div class="cd-grid">
      <div class="cd-box cd-full">
        <span class="cd-label">病历状态</span><span class="cd-val" id="s-state">加载中...</span>
      </div>
      <div class="cd-box">
        <span class="cd-label">本次记录</span><span class="cd-val" id="s-current">加载中...</span>
      </div>
      <div class="cd-box">
        <span class="cd-label">上次互动</span><span class="cd-val" id="s-last">加载中...</span>
      </div>
      <div class="cd-box">
        <span class="cd-label">当前关系</span><span class="cd-val" id="s-relation">加载中...</span>
      </div>
      <div class="cd-box">
        <span class="cd-label">特殊性</span><span class="cd-val" id="s-special">加载中...</span>
      </div>
    </div>
  </div>

  <!-- 模块 2：深度解析 -->
  <div class="cd-section">
    <h3 class="cd-title">🧠 解析</h3>
    <ul class="cd-list">
      <li>
        <strong class="cd-highlight">优势资源：</strong> <span id="s-resource">加载中...</span>
      </li>
      <li><strong class="cd-highlight">问题成因：</strong> <span id="s-cause">加载中...</span></li>
      <li><strong class="cd-highlight">影响评估：</strong> <span id="s-impact">加载中...</span></li>
    </ul>
    <div class="cd-warning">
      ⚠️ <strong>注意事项：</strong> <span id="s-precaution">加载中...</span>
    </div>
  </div>

  <!-- 模块 3：干预计划 -->
  <div class="cd-section" style="margin-bottom: 20px">
    <h3 class="cd-title">🛠️ 干预与目标</h3>
    <ul class="cd-list">
      <li><strong>干预方案：</strong> <span id="s-plan">加载中...</span></li>
      <li><strong>执行事项：</strong> <span id="s-action">加载中...</span></li>
    </ul>
    <div class="cd-target">🎯 <strong>预期目标：</strong> <span id="s-target">加载中...</span></div>
  </div>

  <!-- 底部专属签名区 -->
  <div class="signature-section">
    <img src="assets/glasses.webp" class="decor-glasses" alt="金边眼镜" />
    <div class="doctor-signature">
      <span class="sign-text">林 雨 涵</span>
      <span class="sign-date">Lin Yuhan · Clinical Psychology</span>
    </div>
  </div>
</div>
